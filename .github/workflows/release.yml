name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    if: ${{ github.repository == 'Gitlawb/node' }}
    name: Release Please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.3.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Build & Push Docker Image
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout release tag
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release-please.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release-please.outputs.version }}
            type=raw,value=latest

      - name: Build and load locally (smoke)
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: .
          load: true
          tags: gitlawb-node:smoke
          cache-from: type=gha

      - name: Smoke test
        run: docker run --rm gitlawb-node:smoke --version

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Release summary
        run: |
          {
            echo "## Released ${{ needs.release-please.outputs.tag_name }}"
            echo
            echo "- Image: \`ghcr.io/${{ github.repository }}:${{ needs.release-please.outputs.version }}\`"
            echo "- GitHub: https://github.com/${{ github.repository }}/releases/tag/${{ needs.release-please.outputs.tag_name }}"
          } >> "$GITHUB_STEP_SUMMARY"

  release-binaries:
    name: Build & Attach Binaries
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc8de1b # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install musl tools (linux)
        if: contains(matrix.target, 'linux-musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
            echo "CC_aarch64_unknown_linux_musl=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          fi

      - name: Cache cargo
        uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2.8.0
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p gl -p git-remote-gitlawb -p gitlawb-node

      # Run each packaged binary's --version so a broken release artifact fails the
      # build instead of shipping. Skipped for cross-compiled targets that can't run
      # on the host runner (aarch64 linux on an x86_64 runner).
      - name: Smoke test binaries
        if: ${{ matrix.target != 'aarch64-unknown-linux-musl' }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.release-please.outputs.version }}"
          BIN_DIR="target/${{ matrix.target }}/release"
          EXE=""
          case "${{ matrix.target }}" in *windows*) EXE=".exe" ;; esac
          for bin in gl git-remote-gitlawb gitlawb-node; do
            echo "== $bin --version =="
            out="$("$BIN_DIR/$bin$EXE" --version)"
            echo "$out"
            # Each binary prints "<name> <version>"; assert the released version is present.
            grep -qF "$VERSION" <<<"$out" || {
              echo "::error::$bin --version did not report expected version $VERSION (got: $out)"
              exit 1
            }
          done

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          TARGET="${{ matrix.target }}"
          NAME="gitlawb-node-${{ needs.release-please.outputs.version }}-${TARGET}"
          BIN_DIR="target/${TARGET}/release"
          EXE=""
          case "$TARGET" in *windows*) EXE=".exe" ;; esac

          # Portable sha256 → "<hash>  <file>" so install scripts and brew can parse it.
          sha256_file() {
            local f="$1"
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "$f"
            elif command -v shasum >/dev/null 2>&1; then
              shasum -a 256 "$f"
            else
              local h
              h=$(certutil -hashfile "$f" SHA256 | sed -n 2p | tr -d ' \r')
              printf '%s  %s\n' "$h" "$f"
            fi
          }

          mkdir -p "dist/$NAME"
          for bin in gl git-remote-gitlawb gitlawb-node; do
            cp "$BIN_DIR/$bin$EXE" "dist/$NAME/"
          done
          cp README.md LICENSE-MIT LICENSE-APACHE "dist/$NAME/"

          cd dist
          case "$TARGET" in
            *windows*)
              # 7z is preinstalled on windows-latest runners.
              7z a -tzip "$NAME.zip" "$NAME" >/dev/null
              sha256_file "$NAME.zip" > "$NAME.zip.sha256"
              ;;
            *)
              tar czf "$NAME.tar.gz" "$NAME"
              sha256_file "$NAME.tar.gz" > "$NAME.tar.gz.sha256"
              ;;
          esac

      - name: Attach to release
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256

  npm-publish:
    name: Publish to npm
    needs: [release-please, release-binaries]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - name: Checkout release tag
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Lay in release binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.release-please.outputs.version }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          set -euo pipefail
          # npm platform package -> Rust target triple (unix only; Windows is not
          # published to npm).
          MAP="
          gl-darwin-arm64:aarch64-apple-darwin
          gl-darwin-x64:x86_64-apple-darwin
          gl-linux-arm64:aarch64-unknown-linux-musl
          gl-linux-x64:x86_64-unknown-linux-musl
          "
          mkdir -p _dl
          for entry in $MAP; do
            pkg="${entry%%:*}"
            target="${entry#*:}"
            archive="gitlawb-node-${VERSION}-${target}.tar.gz"
            echo "==> $pkg <- $archive"
            gh release download "$TAG" --repo "$GITHUB_REPOSITORY" \
              --pattern "$archive" --dir _dl --clobber
            tar -xzf "_dl/$archive" -C _dl
            src="_dl/gitlawb-node-${VERSION}-${target}"
            cp "$src/gl" "npm/packages/$pkg/gl"
            cp "$src/git-remote-gitlawb" "npm/packages/$pkg/git-remote-gitlawb"
            chmod +x "npm/packages/$pkg/gl" "npm/packages/$pkg/git-remote-gitlawb"
          done

      - name: Set versions
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          set -euo pipefail
          node -e '
            const fs = require("fs");
            const v = process.env.VERSION;
            for (const p of fs.readdirSync("npm/packages")) {
              const f = `npm/packages/${p}/package.json`;
              const pkg = JSON.parse(fs.readFileSync(f, "utf8"));
              pkg.version = v;
              if (pkg.optionalDependencies) {
                for (const k of Object.keys(pkg.optionalDependencies)) {
                  pkg.optionalDependencies[k] = v;
                }
              }
              fs.writeFileSync(f, JSON.stringify(pkg, null, 2) + "\n");
            }
          '

      - name: Publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "::warning::NPM_TOKEN is not set — skipping npm publish."
            exit 0
          fi
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          # Platform packages first, then the wrapper (so its optionalDependencies resolve).
          for pkg in gl-darwin-arm64 gl-darwin-x64 gl-linux-arm64 gl-linux-x64 gl; do
            echo "==> npm publish @gitlawb/$pkg"
            npm publish "npm/packages/$pkg" --provenance --access public
          done

  homebrew-bump:
    name: Bump Homebrew tap
    needs: [release-please, release-binaries]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Guard on secret
        id: guard
        env:
          HOMEBREW_TAP_PAT: ${{ secrets.HOMEBREW_TAP_PAT }}
        run: |
          if [ -z "${HOMEBREW_TAP_PAT:-}" ]; then
            echo "::warning::HOMEBREW_TAP_PAT is not set — skipping Homebrew bump."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout tap repo
        if: ${{ steps.guard.outputs.enabled == 'true' }}
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: Gitlawb/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_PAT }}
          path: tap

      - name: Regenerate formula
        if: ${{ steps.guard.outputs.enabled == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.release-please.outputs.version }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          set -euo pipefail
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"
          mkdir -p _sums
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" \
            --pattern '*.tar.gz.sha256' --dir _sums --clobber
          sha() { awk '{print $1}' "_sums/gitlawb-node-${VERSION}-$1.tar.gz.sha256"; }
          SHA_MAC_ARM="$(sha aarch64-apple-darwin)"
          SHA_MAC_X64="$(sha x86_64-apple-darwin)"
          SHA_LNX_ARM="$(sha aarch64-unknown-linux-musl)"
          SHA_LNX_X64="$(sha x86_64-unknown-linux-musl)"

          mkdir -p tap/Formula
          cat > tap/Formula/gl.rb <<EOF
          class Gl < Formula
            desc "Gitlawb CLI — decentralized git for AI agents and developers"
            homepage "https://gitlawb.com"
            version "${VERSION}"
            license "MIT OR Apache-2.0"

            on_macos do
              on_arm do
                url "${base}/gitlawb-node-${VERSION}-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_MAC_ARM}"
              end
              on_intel do
                url "${base}/gitlawb-node-${VERSION}-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_MAC_X64}"
              end
            end

            on_linux do
              on_arm do
                url "${base}/gitlawb-node-${VERSION}-aarch64-unknown-linux-musl.tar.gz"
                sha256 "${SHA_LNX_ARM}"
              end
              on_intel do
                url "${base}/gitlawb-node-${VERSION}-x86_64-unknown-linux-musl.tar.gz"
                sha256 "${SHA_LNX_X64}"
              end
            end

            def install
              bin.install "gl"
              bin.install "git-remote-gitlawb"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/gl --version")
            end
          end
          EOF

      - name: Commit and push
        if: ${{ steps.guard.outputs.enabled == 'true' }}
        working-directory: tap
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "Formula already up to date."
            exit 0
          fi
          git add Formula/gl.rb
          git commit -m "gl ${VERSION}"
          git push
